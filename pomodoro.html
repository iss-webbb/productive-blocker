<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productive Blocker</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://cdn.boxicons.com/3.0.6/fonts/basic/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <div class="timer">
        <i class='bx  bx-stopwatch timer'></i>
    </div>

    <h1 id="head">It's time to study</h1>
    <h1 id="time">25:00</h1>

    <div id="center">
        <h1 id="Set">Set Time: </h1><input id="input" type="number" placeholder="type mins you want to focus (eg: 25)">
    </div>



    <div id="but">
        <button id="start">Start</button>
        <button id="stop">Stop</button>
    </div>

    <script src="pomodoro.js"> </script>

</body>

</html>
